<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php" method="post" autocomplete="off"> 
        <!--Post não vai mostrar na url-->
        <p>
            <label for="iusu">Usuário:</label>
            <input type="text" name="usu" id="iusu" required minlength="5" maxlength="15" size="15" placeholder="nome do usuário">
            <!--
            placeholder usado para colocar um exemplo dentro da caixa de texto

            Caso colocar o <autocomplete> dentro de um input podemos manipular ele para que o computador sugira algo que tenha registrado como senhas, nomes, sexo, etc... 
            -->
        </p>
        <p>
            <label for="isen">Senha: </label>
            <input type="password" name="sen" id="isen" required minlength="8"> 
            <!-- 
            Required faz com que o campo seja obrigatorio
            
            minlength e maxlength faz com que tenha tamanho maximo e minimo 
            -->
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
