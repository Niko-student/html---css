<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1> Inserindo vídeos hospedados localmente.</h1>
    <p>Este video está hospedado no meu proprio servidor</p>
    <video controls width="500" poster="imagens/Capa.png">
        <source src="video/meu-video-compre.mp4" type="video/mp4">
        <p>Seu navegador não suporta o elemento de vídeo.</p>
    </video>

    <h1>Inserindo vídeos do Youtube.</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/F8zqVO8UqTM?si=7Deai7B9y0Ci9PE0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
