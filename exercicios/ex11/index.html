<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias</title>
</head>
<body>
    <h1>Imagens Dinamicas</h1>
    <p>Tente abrir essas sites em varios dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/Foto-P.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/Foto-M.png" type="image/png">
        <img src="imagens/Foto-g.png" alt="Imagem flexivel">
    </picture>
    <h1>Reproduzindo Audio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5</p>
    <audio preload="metadata" controls loop> 
        <source src="midia/Daytime Forrest Bonfire.mp3" type="audio/mpeg">
        <source src="midia/Audio-M.ogg" type="audio/ogg">
        <source src="midia/Audio-G.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="midia/Daytime Forrest Bonfire.mp3">Clique aqui para baixar o aquivo MP3.</a></p>
    </audio>
</body>
</html>
